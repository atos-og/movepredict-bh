name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_DB: movepredict_test
          POSTGRES_USER: movepredict
          POSTGRES_PASSWORD: movepredict
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U movepredict -d movepredict_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pip check
      - run: ruff check app tests migrations ../data-exploration/scripts ../data-exploration/tests
      - run: ruff format --check app tests migrations ../data-exploration/scripts ../data-exploration/tests
      - run: alembic upgrade head
        env:
          MOVEPREDICT_DATABASE_URL: postgresql+psycopg://movepredict:movepredict@localhost:5432/movepredict_test
      - run: pytest tests ../data-exploration/tests
        env:
          MOVEPREDICT_TEST_DATABASE_URL: postgresql+psycopg://movepredict:movepredict@localhost:5432/movepredict_test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:ci
