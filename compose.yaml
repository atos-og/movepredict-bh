services:
  api:
    build: ./backend
    environment:
      MOVEPREDICT_ENVIRONMENT: production
      MOVEPREDICT_GTFS_DATA_DIR: /data/gtfs
      MOVEPREDICT_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./data-exploration/data/raw:/data/gtfs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
