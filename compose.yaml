services:
  db:
    image: postgis/postgis:17-3.5
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB: movepredict
      POSTGRES_USER: movepredict
      POSTGRES_PASSWORD: movepredict
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movepredict -d movepredict"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      MOVEPREDICT_ENVIRONMENT: production
      MOVEPREDICT_GTFS_DATA_DIR: /data/gtfs
      MOVEPREDICT_CORS_ORIGINS: ${MOVEPREDICT_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MOVEPREDICT_DATABASE_URL: postgresql+psycopg://movepredict:movepredict@db:5432/movepredict
      MOVEPREDICT_JOURNEY_PLANNER_URL: ${MOVEPREDICT_JOURNEY_PLANNER_URL:-http://otp:8080/otp/gtfs/v1}
      MOVEPREDICT_GEOCODING_URL: ${MOVEPREDICT_GEOCODING_URL:-https://nominatim.openstreetmap.org}
      MOVEPREDICT_GEOCODING_USER_AGENT: ${MOVEPREDICT_GEOCODING_USER_AGENT:-MovePredict-BH/0.1 (+https://github.com/atos-og/movepredict-bh)}
      MOVEPREDICT_GTFS_RT_ALERTS_URL: ${MOVEPREDICT_GTFS_RT_ALERTS_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data-exploration/data/raw:/data/gtfs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  collector:
    build: ./backend
    restart: unless-stopped
    command: ["sh", "-c", "alembic upgrade head && python -m app.workers.realtime_pipeline"]
    environment:
      MOVEPREDICT_DATABASE_URL: postgresql+psycopg://movepredict:movepredict@db:5432/movepredict
      MOVEPREDICT_REALTIME_POSITIONS_URL: https://temporeal.pbh.gov.br/?param=D
      MOVEPREDICT_REALTIME_INTERVAL_SECONDS: 20
      MOVEPREDICT_REALTIME_TIMEOUT_SECONDS: 15
      MOVEPREDICT_REALTIME_MAX_RETRIES: 4
      MOVEPREDICT_REALTIME_BACKOFF_SECONDS: 1
      MOVEPREDICT_REALTIME_DISAPPEARANCE_SECONDS: 120
      MOVEPREDICT_REALTIME_MAX_FUTURE_SECONDS: 300
      MOVEPREDICT_TRIP_MATCH_BATCH_SIZE: 5000
      MOVEPREDICT_ARRIVAL_DETECTION_BATCH_SIZE: 2000
    depends_on:
      db:
        condition: service_healthy

  gtfs-import:
    profiles: ["tools"]
    build: ./backend
    command: ["sh", "-c", "alembic upgrade head && python -m app.workers.gtfs_importer --include-stop-times"]
    environment:
      MOVEPREDICT_DATABASE_URL: postgresql+psycopg://movepredict:movepredict@db:5432/movepredict
      MOVEPREDICT_GTFS_DATA_DIR: /data/gtfs
    volumes:
      - ./data-exploration/data/raw:/data/gtfs:ro
    depends_on:
      db:
        condition: service_healthy

  retention:
    build: ./backend
    restart: unless-stopped
    command: ["python", "-m", "app.workers.retention"]
    environment:
      MOVEPREDICT_DATABASE_URL: postgresql+psycopg://movepredict:movepredict@db:5432/movepredict
      MOVEPREDICT_POSITION_RETENTION_DAYS: 90
      MOVEPREDICT_POSITION_RETENTION_BATCH_SIZE: 50000
    depends_on:
      db:
        condition: service_healthy

  otp-build:
    profiles: ["routing-tools"]
    image: opentripplanner/opentripplanner:2.9.0
    command: ["--build", "--save"]
    environment:
      JAVA_TOOL_OPTIONS: -Xmx${OTP_JAVA_MAX_HEAP:-4G}
    volumes:
      - ./routing/otp:/var/opentripplanner

  otp:
    profiles: ["routing"]
    image: opentripplanner/opentripplanner:2.9.0
    restart: unless-stopped
    command: ["--load", "--serve"]
    environment:
      JAVA_TOOL_OPTIONS: -Xmx${OTP_JAVA_MAX_HEAP:-4G}
    ports:
      - "8080:8080"
    volumes:
      - ./routing/otp:/var/opentripplanner

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        API_PROXY_TARGET: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
